{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Register — AI Job Portal{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow border-0">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus-fill text-primary fs-1"></i>
                        <h3 class="fw-bold mt-2">Create Account</h3>
                        <p class="text-muted">Join AI Job Portal today</p>
                    </div>
                    {% crispy form %}
                    <p class="text-center mt-3 text-muted">
                        Already have an account? <a href="/accounts/login/">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
